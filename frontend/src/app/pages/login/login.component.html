<section class="page">
  <header class="page__header">
    <h1>Login</h1>
    <p>Entre com suas credenciais para acessar o sistema.</p>
  </header>

  <form class="login-form" (ngSubmit)="submit()">
    <label>
      Usuario
      <input type="text" [(ngModel)]="username" name="username" placeholder="Digite seu usuario" />
    </label>

    <label>
      Senha
      <input type="password" [(ngModel)]="password" name="password" placeholder="Digite sua senha" />
    </label>

    <button type="submit" [disabled]="isSubmitting">
      {{ isSubmitting ? 'Entrando...' : 'Entrar' }}
    </button>

    <p class="form-error" *ngIf="error">{{ error }}</p>
  </form>

  <div class="page__hint">
    <p>Usuario de teste: <code>admin</code></p>
    <p>Senha de teste: <code>123456</code></p>
  </div>

  <p class="page__footer">
    <a routerLink="/">Voltar para Home</a>
  </p>
</section>
